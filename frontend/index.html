<!DOCTYPE html>
<html>

<head>
    <title>Wumpus Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Wumpus World Agent</h1>

    <div id="grid"></div>

    <script src="app.js"></script>

</html>
